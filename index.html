<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>ONS Financeiro - Windows 95/97</title>
    
    <!-- PWA Meta -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#008080">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="ONS Finanças">
    
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    
    <style>
        /* ===== WINDOWS 95/97 THEME ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Tahoma', 'Segoe UI', 'MS Sans Serif', sans-serif;
        }
        
        body {
            background-color: #008080;
            padding: 20px;
            min-height: 100vh;
        }
        
        .desktop {
            max-width: 1400px;
            margin: 0 auto;
        }
        
        /* Janela Windows 95 */
        .window {
            background-color: #c0c0c0;
            border-style: solid;
            border-width: 3px;
            border-color: #ffffff #808080 #808080 #ffffff;
            margin-bottom: 20px;
            box-shadow: 2px 2px 5px rgba(0,0,0,0.3);
        }
        
        /* Barra de título */
        .title-bar {
            background-color: #000080;
            color: white;
            padding: 6px 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-weight: bold;
            font-size: 14px;
            cursor: default;
        }
        
        .title-bar-text {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .title-bar-controls button {
            background-color: #c0c0c0;
            border-style: solid;
            border-width: 2px;
            border-color: #ffffff #808080 #808080 #ffffff;
            width: 24px;
            height: 22px;
            cursor: pointer;
            font-size: 12px;
            font-weight: bold;
        }
        
        .window-content {
            padding: 16px;
        }
        
        /* Botões Windows 95 */
        .win95-btn {
            background-color: #c0c0c0;
            border-style: solid;
            border-width: 2px;
            border-color: #ffffff #808080 #808080 #ffffff;
            padding: 6px 16px;
            font-family: 'Tahoma', sans-serif;
            font-size: 12px;
            font-weight: bold;
            cursor: pointer;
            transition: none;
        }
        
        .win95-btn:active {
            border-color: #808080 #ffffff #ffffff #808080;
        }
        
        .field-group {
            margin-bottom: 14px;
        }
        
        .field-group label {
            display: block;
            font-size: 12px;
            font-weight: bold;
            margin-bottom: 4px;
        }
        
        input, select {
            background-color: white;
            border-style: solid;
            border-width: 2px;
            border-color: #808080 #ffffff #ffffff #808080;
            padding: 6px 8px;
            font-size: 12px;
            width: 100%;
            font-family: 'Tahoma', sans-serif;
        }
        
        input:focus, select:focus {
            outline: none;
            border-color: #000080;
        }
        
        .items-list {
            max-height: 300px;
            overflow-y: auto;
            background-color: white;
            border-style: solid;
            border-width: 2px;
            border-color: #808080 #ffffff #ffffff #808080;
            padding: 8px;
        }
        
        .item-row {
            padding: 6px;
            border-bottom: 1px solid #808080;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 12px;
        }
        
        .item-row:last-child {
            border-bottom: none;
        }
        
        .item-info {
            flex: 1;
        }
        
        .item-value {
            font-weight: bold;
            margin-right: 12px;
        }
        
        .categories-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 16px;
            margin-bottom: 16px;
        }
        
        @media (min-width: 768px) {
            .categories-grid {
                grid-template-columns: repeat(3, 1fr);
            }
        }
        
        .category-card {
            background-color: #c0c0c0;
            border-style: solid;
            border-width: 3px;
            border-color: #ffffff #808080 #808080 #ffffff;
            padding: 12px;
        }
        
        .category-title {
            background-color: #000080;
            color: white;
            padding: 4px 8px;
            font-size: 12px;
            font-weight: bold;
            margin-bottom: 10px;
        }
        
        .total-value {
            margin-top: 10px;
            padding-top: 8px;
            border-top: 1px solid #808080;
            text-align: right;
            font-weight: bold;
            font-size: 13px;
        }
        
        .tabs {
            display: flex;
            gap: 2px;
            margin-bottom: 16px;
            flex-wrap: wrap;
        }
        
        .tab-btn {
            background-color: #c0c0c0;
            border-style: solid;
            border-width: 2px;
            border-color: #ffffff #808080 #808080 #ffffff;
            padding: 8px 20px;
            font-family: 'Tahoma', sans-serif;
            font-size: 12px;
            font-weight: bold;
            cursor: pointer;
        }
        
        .tab-btn.active {
            border-color: #808080 #ffffff #ffffff #808080;
            background-color: #a0a0a0;
        }
        
        .tab-pane {
            display: none;
        }
        
        .tab-pane.active {
            display: block;
        }
        
        .period-selector {
            background-color: #c0c0c0;
            border-style: solid;
            border-width: 3px;
            border-color: #ffffff #808080 #808080 #ffffff;
            padding: 12px;
            margin-bottom: 16px;
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            align-items: flex-end;
        }
        
        .period-selector .field-group {
            margin-bottom: 0;
            flex: 1;
        }
        
        .main-balance {
            background-color: #000080;
            color: white;
            padding: 12px;
            text-align: center;
            margin-bottom: 20px;
        }
        
        .main-balance .label {
            font-size: 12px;
        }
        
        .main-balance .value {
            font-size: 24px;
            font-weight: bold;
        }
        
        .search-box {
            margin-bottom: 12px;
            display: flex;
            gap: 8px;
        }
        
        .search-box input {
            flex: 1;
        }
        
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.5);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }
        
        .modal.active {
            display: flex;
        }
        
        .modal-window {
            width: 90%;
            max-width: 450px;
        }
        
        .delete-btn {
            background-color: #c0c0c0;
            border-style: solid;
            border-width: 2px;
            border-color: #ffffff #808080 #808080 #ffffff;
            padding: 2px 8px;
            cursor: pointer;
            font-size: 11px;
            margin-left: 4px;
        }
        
        .delete-btn:active {
            border-color: #808080 #ffffff #ffffff #808080;
        }
        
        @media (max-width: 480px) {
            body {
                padding: 10px;
            }
            .tab-btn {
                padding: 6px 12px;
                font-size: 11px;
            }
            .win95-btn {
                padding: 4px 12px;
            }
        }
    </style>
</head>
<body>
    <div class="desktop">
        <!-- Saldo principal -->
        <div class="main-balance">
            <div class="label">SALDO TOTAL</div>
            <div class="value" id="saldoTotal">R$ 0,00</div>
        </div>
        
        <!-- Abas -->
        <div class="tabs">
            <button class="tab-btn active" data-tab="dashboard">📊 Dashboard</button>
            <button class="tab-btn" data-tab="add">➕ Adicionar</button>
            <button class="tab-btn" data-tab="extrato">📋 Extrato</button>
            <button class="tab-btn" data-tab="relatorio">📄 Relatório</button>
            <button class="tab-btn" data-tab="backup">💾 Backup</button>
        </div>
        
        <!-- DASHBOARD -->
        <div id="dashboard" class="tab-pane active">
            <div class="categories-grid">
                <div class="category-card">
                    <div class="category-title">👤 Despesas Pessoais</div>
                    <div id="listaPessoais" class="items-list" style="max-height: 200px;"></div>
                    <div class="total-value">Total: <span id="totalPessoais">R$ 0,00</span></div>
                    <button class="win95-btn" style="width:100%; margin-top:10px;" onclick="abrirModalAdicionar('pessoal')">+ Adicionar</button>
                </div>
                
                <div class="category-card">
                    <div class="category-title">🏷️ Não Categorizadas</div>
                    <div id="listaNaoCategorizadas" class="items-list" style="max-height: 200px;"></div>
                    <div class="total-value">Total: <span id="totalNaoCategorizadas">R$ 0,00</span></div>
                    <button class="win95-btn" style="width:100%; margin-top:10px;" onclick="abrirModalAdicionar('naocategorizada')">+ Adicionar</button>
                </div>
                
                <div class="category-card">
                    <div class="category-title">🏠 Despesas Fixas</div>
                    <div id="listaFixas" class="items-list" style="max-height: 200px;"></div>
                    <div class="total-value">Total: <span id="totalFixas">R$ 0,00</span></div>
                    <button class="win95-btn" style="width:100%; margin-top:10px;" onclick="abrirModalAdicionar('fixa')">+ Adicionar</button>
                </div>
            </div>
            
            <div class="window">
                <div class="title-bar">
                    <div class="title-bar-text">📈 Resumo Financeiro</div>
                </div>
                <div class="window-content">
                    <div style="display: grid; grid-template-columns: 1fr; gap: 16px;">
                        <div>
                            <canvas id="graficoGastos" style="max-height: 200px;"></canvas>
                        </div>
                        <div style="text-align: center;">
                            <div class="field-group">
                                <label>💰 RECEITAS</label>
                                <div style="font-size: 20px; color: #000080;" id="totalReceitas">R$ 0,00</div>
                            </div>
                            <div class="field-group">
                                <label>💸 DESPESAS TOTAIS</label>
                                <div style="font-size: 20px; color: #800000;" id="totalDespesas">R$ 0,00</div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        
        <!-- ADICIONAR -->
        <div id="add" class="tab-pane">
            <div class="window">
                <div class="title-bar">
                    <div class="title-bar-text">➕ Nova Despesa</div>
                </div>
                <div class="window-content">
                    <div class="field-group">
                        <label>Tipo:</label>
                        <select id="tipoDespesa">
                            <option value="pessoal">Despesas Pessoais</option>
                            <option value="naocategorizada">Não Categorizadas</option>
                            <option value="fixa">Despesas Fixas</option>
                        </select>
                    </div>
                    <div class="field-group">
                        <label>Categoria:</label>
                        <select id="categoriaDespesa"></select>
                    </div>
                    <div class="field-group">
                        <label>Descrição:</label>
                        <input type="text" id="descricaoDespesa" placeholder="Ex: Restaurante, Uber...">
                    </div>
                    <div class="field-group">
                        <label>Valor (R$):</label>
                        <input type="number" id="valorDespesa" step="0.01">
                    </div>
                    <div class="field-group">
                        <label>Data:</label>
                        <input type="date" id="dataDespesa">
                    </div>
                    <button class="win95-btn" style="width:100%;" onclick="salvarDespesa()">Salvar Despesa</button>
                </div>
            </div>
            
            <div class="window" style="margin-top: 16px;">
                <div class="title-bar">
                    <div class="title-bar-text">💵 Nova Receita</div>
                </div>
                <div class="window-content">
                    <div class="field-group">
                        <label>Descrição:</label>
                        <input type="text" id="descricaoReceita" placeholder="Ex: Salário, Freela...">
                    </div>
                    <div class="field-group">
                        <label>Valor (R$):</label>
                        <input type="number" id="valorReceita" step="0.01">
                    </div>
                    <div class="field-group">
                        <label>Data:</label>
                        <input type="date" id="dataReceita">
                    </div>
                    <button class="win95-btn" style="width:100%;" onclick="salvarReceita()">Salvar Receita</button>
                </div>
            </div>
        </div>
        
        <!-- EXTRATO -->
        <div id="extrato" class="tab-pane">
            <div class="window">
                <div class="title-bar">
                    <div class="title-bar-text">📋 Extrato de Transações</div>
                </div>
                <div class="window-content">
                    <div class="search-box">
                        <input type="text" id="buscaExtrato" placeholder="Buscar por descrição..." onkeyup="carregarExtrato()">
                        <select id="filtroTipo" onchange="carregarExtrato()">
                            <option value="todos">Todos</option>
                            <option value="despesa">Despesas</option>
                            <option value="receita">Receitas</option>
                        </select>
                    </div>
                    <div id="extratoLista" class="items-list" style="max-height: 400px;"></div>
                </div>
            </div>
        </div>
        
        <!-- RELATÓRIO -->
        <div id="relatorio" class="tab-pane">
            <div class="period-selector">
                <div class="field-group">
                    <label>Data Inicial:</label>
                    <input type="date" id="dataInicio" value="2024-01-01">
                </div>
                <div class="field-group">
                    <label>Data Final:</label>
                    <input type="date" id="dataFim" value="">
                </div>
                <button class="win95-btn" onclick="imprimirRelatorioPeriodo()">🖨️ Gerar e Imprimir Relatório</button>
            </div>
            
            <div class="window">
                <div class="title-bar">
                    <div class="title-bar-text">📄 Prévia do Relatório</div>
                </div>
                <div class="window-content">
                    <div id="previaRelatorio"></div>
                </div>
            </div>
        </div>
        
        <!-- BACKUP -->
        <div id="backup" class="tab-pane">
            <div class="window">
                <div class="title-bar">
                    <div class="title-bar-text">💾 Backup e Restauração</div>
                </div>
                <div class="window-content">
                    <button class="win95-btn" style="width:100%; margin-bottom:16px;" onclick="exportarJSON()">
                        📥 Exportar Dados (JSON)
                    </button>
                    <hr style="margin: 16px 0; border-color: #808080;">
                    <div class="field-group">
                        <label>Restaurar Backup:</label>
                        <input type="file" id="arquivoBackup" accept=".json" style="background-color: white;">
                    </div>
                    <button class="win95-btn" style="width:100%; margin-top:8px;" onclick="importarJSON()">
                        📤 Importar Dados
                    </button>
                    <hr style="margin: 16px 0; border-color: #808080;">
                    <button class="win95-btn" style="width:100%; background-color:#800000; color:white;" onclick="limparTodosDados()">
                        🗑️ Limpar Todos os Dados
                    </button>
                </div>
            </div>
        </div>
    </div>
    
    <!-- Modal -->
    <div id="modalGasto" class="modal">
        <div class="window modal-window">
            <div class="title-bar">
                <div class="title-bar-text" id="modalTitulo">Nova Despesa</div>
                <div class="title-bar-controls">
                    <button onclick="fecharModal()">✕</button>
                </div>
            </div>
            <div class="window-content">
                <div class="field-group">
                    <label>Categoria:</label>
                    <select id="modalCategoria"></select>
                </div>
                <div class="field-group">
                    <label>Descrição:</label>
                    <input type="text" id="modalDescricao">
                </div>
                <div class="field-group">
                    <label>Valor (R$):</label>
                    <input type="number" id="modalValor" step="0.01">
                </div>
                <div class="field-group">
                    <label>Data:</label>
                    <input type="date" id="modalData">
                </div>
                <button class="win95-btn" style="width:100%;" onclick="salvarModalDespesa()">Salvar</button>
            </div>
        </div>
    </div>
    
    <script>
        // DADOS GLOBAIS
        let despesas = {
            pessoal: [],
            naocategorizada: [],
            fixa: []
        };
        let receitas = [];
        let currentChart = null;
        let modalEditando = null;
        let windowModalTipoAtual = null;
        
        const categorias = {
            pessoal: ['Alimentação', 'Saúde', 'Educação', 'Vestuário', 'Transporte', 'Lazer', 'Outros'],
            naocategorizada: ['Compras', 'Presentes', 'Viagem', 'Entretenimento', 'Outros'],
            fixa: ['Aluguel', 'Condomínio', 'Luz', 'Água', 'Internet', 'Telefone', 'Streaming', 'Supermercado', 'Outros']
        };
        
        function formatMoney(value) {
            return new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL' }).format(value);
        }
        
        function getToday() {
            return new Date().toISOString().split('T')[0];
        }
        
        function carregarDados() {
            const savedDespesas = localStorage.getItem('ons_despesas');
            const savedReceitas = localStorage.getItem('ons_receitas');
            if (savedDespesas) despesas = JSON.parse(savedDespesas);
            if (savedReceitas) receitas = JSON.parse(savedReceitas);
            if (!despesas.pessoal) despesas.pessoal = [];
            if (!despesas.naocategorizada) despesas.naocategorizada = [];
            if (!despesas.fixa) despesas.fixa = [];
        }
        
        function salvarDados() {
            localStorage.setItem('ons_despesas', JSON.stringify(despesas));
            localStorage.setItem('ons_receitas', JSON.stringify(receitas));
        }
        
        function getTotalDespesasTipo(tipo) {
            return despesas[tipo].reduce((sum, item) => sum + item.valor, 0);
        }
        
        function getTotalDespesasGeral() {
            return getTotalDespesasTipo('pessoal') + getTotalDespesasTipo('naocategorizada') + getTotalDespesasTipo('fixa');
        }
        
        function getTotalReceitas() {
            return receitas.reduce((sum, item) => sum + item.valor, 0);
        }
        
        function getSaldo() {
            return getTotalReceitas() - getTotalDespesasGeral();
        }
        
        function renderizarDashboard() {
            document.getElementById('totalPessoais').innerHTML = formatMoney(getTotalDespesasTipo('pessoal'));
            document.getElementById('totalNaoCategorizadas').innerHTML = formatMoney(getTotalDespesasTipo('naocategorizada'));
            document.getElementById('totalFixas').innerHTML = formatMoney(getTotalDespesasTipo('fixa'));
            document.getElementById('totalReceitas').innerHTML = formatMoney(getTotalReceitas());
            document.getElementById('totalDespesas').innerHTML = formatMoney(getTotalDespesasGeral());
            document.getElementById('saldoTotal').innerHTML = formatMoney(getSaldo());
            
            renderizarLista('pessoal', 'listaPessoais');
            renderizarLista('naocategorizada', 'listaNaoCategorizadas');
            renderizarLista('fixa', 'listaFixas');
            renderizarGrafico();
        }
        
        function renderizarLista(tipo, elementId) {
            const container = document.getElementById(elementId);
            const itens = despesas[tipo];
            if (itens.length === 0) {
                container.innerHTML = '<div style="text-align:center; padding:15px; color:#808080;">Nenhuma despesa</div>';
                return;
            }
            container.innerHTML = '';
            itens.forEach((item, idx) => {
                container.innerHTML += `
                    <div class="item-row">
                        <div class="item-info">
                            <div><strong>${item.descricao}</strong></div>
                            <small>${item.categoria} - ${new Date(item.data).toLocaleDateString()}</small>
                        </div>
                        <div class="item-value">${formatMoney(item.valor)}</div>
                        <button class="delete-btn" onclick="editarDespesa('${tipo}', ${idx})">✏️</button>
                        <button class="delete-btn" onclick="excluirDespesa('${tipo}', ${idx})">🗑️</button>
                    </div>
                `;
            });
        }
        
        function renderizarGrafico() {
            const ctx = document.getElementById('graficoGastos').getContext('2d');
            if (currentChart) currentChart.destroy();
            currentChart = new Chart(ctx, {
                type: 'pie',
                data: {
                    labels: ['Despesas Pessoais', 'Não Categorizadas', 'Despesas Fixas'],
                    datasets: [{
                        data: [getTotalDespesasTipo('pessoal'), getTotalDespesasTipo('naocategorizada'), getTotalDespesasTipo('fixa')],
                        backgroundColor: ['#000080', '#808080', '#800000'],
                        borderWidth: 1
                    }]
                },
                options: { responsive: true, maintainAspectRatio: true, plugins: { legend: { position: 'bottom', labels: { font: { size: 10 } } } } }
            });
        }
        
        function salvarDespesa() {
            const tipo = document.getElementById('tipoDespesa').value;
            const categoria = document.getElementById('categoriaDespesa').value;
            const descricao = document.getElementById('descricaoDespesa').value.trim();
            const valor = parseFloat(document.getElementById('valorDespesa').value);
            let data = document.getElementById('dataDespesa').value;
            if (!descricao) { alert('Informe a descrição!'); return; }
            if (isNaN(valor) || valor <= 0) { alert('Valor inválido!'); return; }
            if (!data) data = getToday();
            despesas[tipo].push({ id: Date.now(), categoria, descricao, valor, data });
            salvarDados();
            document.getElementById('descricaoDespesa').value = '';
            document.getElementById('valorDespesa').value = '';
            alert('Despesa salva!');
            renderizarDashboard();
        }
        
        function excluirDespesa(tipo, idx) {
            if (!confirm('Excluir esta despesa?')) return;
            despesas[tipo].splice(idx, 1);
            salvarDados();
            renderizarDashboard();
            alert('Despesa excluída!');
        }
        
        function editarDespesa(tipo, idx) {
            const item = despesas[tipo][idx];
            modalEditando = { tipo, index: idx, item };
            document.getElementById('modalTitulo').innerText = '✏️ Editar Despesa';
            const selectCategoria = document.getElementById('modalCategoria');
            selectCategoria.innerHTML = '';
            categorias[tipo].forEach(cat => {
                const option = document.createElement('option');
                option.value = cat;
                option.text = cat;
                if (cat === item.categoria) option.selected = true;
                selectCategoria.appendChild(option);
            });
            document.getElementById('modalDescricao').value = item.descricao;
            document.getElementById('modalValor').value = item.valor;
            document.getElementById('modalData').value = item.data;
            document.getElementById('modalGasto').classList.add('active');
        }
        
        function salvarModalDespesa() {
            if (!modalEditando) {
                const tipo = windowModalTipoAtual || 'pessoal';
                const categoria = document.getElementById('modalCategoria').value;
                const descricao = document.getElementById('modalDescricao').value.trim();
                const valor = parseFloat(document.getElementById('modalValor').value);
                let data = document.getElementById('modalData').value;
                if (!descricao) { alert('Informe a descrição!'); return; }
                if (isNaN(valor) || valor <= 0) { alert('Valor inválido!'); return; }
                if (!data) data = getToday();
                despesas[tipo].push({ id: Date.now(), categoria, descricao, valor, data });
                alert('Despesa salva!');
            } else {
                const { tipo, index } = modalEditando;
                despesas[tipo][index] = {
                    ...despesas[tipo][index],
                    categoria: document.getElementById('modalCategoria').value,
                    descricao: document.getElementById('modalDescricao').value.trim(),
                    valor: parseFloat(document.getElementById('modalValor').value),
                    data: document.getElementById('modalData').value
                };
                alert('Despesa atualizada!');
                modalEditando = null;
            }
            salvarDados();
            fecharModal();
            renderizarDashboard();
        }
        
        function abrirModalAdicionar(tipo) {
            windowModalTipoAtual = tipo;
            modalEditando = null;
            document.getElementById('modalTitulo').innerText = '➕ Nova Despesa';
            const selectCategoria = document.getElementById('modalCategoria');
            selectCategoria.innerHTML = '';
            categorias[tipo].forEach(cat => {
                const option = document.createElement('option');
                option.value = cat;
                option.text = cat;
                selectCategoria.appendChild(option);
            });
            document.getElementById('modalDescricao').value = '';
            document.getElementById('modalValor').value = '';
            document.getElementById('modalData').value = getToday();
            document.getElementById('modalGasto').classList.add('active');
        }
        
        function fecharModal() {
            document.getElementById('modalGasto').classList.remove('active');
            modalEditando = null;
        }
        
        function salvarReceita() {
            const descricao = document.getElementById('descricaoReceita').value.trim();
            const valor = parseFloat(document.getElementById('valorReceita').value);
            let data = document.getElementById('dataReceita').value;
            if (!descricao) { alert('Informe a descrição!'); return; }
            if (isNaN(valor) || valor <= 0) { alert('Valor inválido!'); return; }
            if (!data) data = getToday();
            receitas.push({ id: Date.now(), descricao, valor, data });
            salvarDados();
            document.getElementById('descricaoReceita').value = '';
            document.getElementById('valorReceita').value = '';
            alert('Receita salva!');
            renderizarDashboard();
        }
        
        function carregarExtrato() {
            const busca = document.getElementById('buscaExtrato').value.toLowerCase();
            const filtro = document.getElementById('filtroTipo').value;
            let transacoes = [];
            if (filtro === 'todos' || filtro === 'despesa') {
                for (const [tipo, itens] of Object.entries(despesas)) {
                    itens.forEach(item => {
                        transacoes.push({ ...item, tipoTransacao: 'despesa', subTipo: tipo });
                    });
                }
            }
            if (filtro === 'todos' || filtro === 'receita') {
                receitas.forEach(item => {
                    transacoes.push({ ...item, tipoTransacao: 'receita' });
                });
            }
            if (busca) transacoes = transacoes.filter(t => t.descricao.toLowerCase().includes(busca));
            transacoes.sort((a, b) => new Date(b.data) - new Date(a.data));
            const container = document.getElementById('extratoLista');
            if (transacoes.length === 0) {
                container.innerHTML = '<div style="text-align:center; padding:20px;">Nenhuma transação encontrada</div>';
                return;
            }
            container.innerHTML = '';
            transacoes.forEach(item => {
                const isDespesa = item.tipoTransacao === 'despesa';
                container.innerHTML += `
                    <div class="item-row">
                        <div class="item-info">
                            <div><strong>${item.descricao}</strong></div>
                            <small>${new Date(item.data).toLocaleDateString()} | ${isDespesa ? item.subTipo : 'Receita'}</small>
                        </div>
                        <div class="item-value" style="color: ${isDespesa ? '#800000' : '#000080'}">
                            ${isDespesa ? '-' : '+'} ${formatMoney(item.valor)}
                        </div>
                    </div>
                `;
            });
        }
        
        function gerarHTMLRelatorio(dataInicio, dataFim) {
            const inicio = new Date(dataInicio);
            const fim = new Date(dataFim);
            fim.setHours(23, 59, 59);
            let despesasFiltradas = [];
            for (const [tipo, itens] of Object.entries(despesas)) {
                itens.forEach(item => {
                    const dataItem = new Date(item.data);
                    if (dataItem >= inicio && dataItem <= fim) {
                        despesasFiltradas.push({ ...item, tipo });
                    }
                });
            }
            let receitasFiltradas = receitas.filter(item => {
                const dataItem = new Date(item.data);
                return dataItem >= inicio && dataItem <= fim;
            });
            let somaCategorias = {};
            despesasFiltradas.forEach(item => {
                const cat = item.categoria;
                if (!somaCategorias[cat]) somaCategorias[cat] = 0;
                somaCategorias[cat] += item.valor;
            });
            const totalDespesas = despesasFiltradas.reduce((s, i) => s + i.valor, 0);
            const totalReceitas = receitasFiltradas.reduce((s, i) => s + i.valor, 0);
            const saldo = totalReceitas - totalDespesas;
            let tabelaDespesas = '';
            despesasFiltradas.forEach(item => {
                tabelaDespesas += `<tr><td>${item.descricao}</td><td>${item.categoria}</td><td>${new Date(item.data).toLocaleDateString()}</td><td style="text-align:right">${formatMoney(item.valor)}</td></tr>`;
            });
            const categoriasLabels = Object.keys(somaCategorias);
            const categoriasValues = Object.values(somaCategorias);
            return `
                <!DOCTYPE html>
                <html>
                <head>
                    <meta charset="UTF-8">
                    <title>Relatório Financeiro ONS</title>
                    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"><\/script>
                    <style>
                        * { font-family: 'Tahoma', 'Segoe UI', sans-serif; margin: 0; padding: 0; box-sizing: border-box; }
                        body { padding: 20px; background: white; }
                        .report-header { text-align: center; margin-bottom: 20px; padding-bottom: 15px; border-bottom: 2px solid #000080; }
                        .report-header h1 { color: #000080; font-size: 20px; }
                        .periodo { background: #c0c0c0; padding: 10px; margin: 15px 0; border: 1px solid #808080; }
                        .summary { background: #f0f0f0; padding: 15px; margin: 15px 0; border: 1px solid #808080; }
                        .summary table { width: 100%; }
                        .summary td { padding: 5px; }
                        table { width: 100%; border-collapse: collapse; margin: 15px 0; }
                        th, td { border: 1px solid #808080; padding: 8px; text-align: left; }
                        th { background: #000080; color: white; }
                        .chart-container { width: 300px; margin: 20px auto; }
                        .total-geral { font-size: 18px; font-weight: bold; text-align: right; margin-top: 20px; padding-top: 10px; border-top: 2px solid #000080; }
                        @media print { body { padding: 0; } button { display: none; } }
                    </style>
                </head>
                <body>
                    <div class="report-header">
                        <h1>📊 ONS FINANCEIRO - RELATÓRIO POR PERÍODO</h1>
                        <p>Documento gerado em: ${new Date().toLocaleString()}</p>
                    </div>
                    <div class="periodo">
                        <strong>Período:</strong> ${new Date(dataInicio).toLocaleDateString()} até ${new Date(dataFim).toLocaleDateString()}
                    </div>
                    <div class="summary">
                        <table>
                            </table><td><strong>💰 Total de Receitas:</strong></td><td style="text-align:right; color:#000080;">${formatMoney(totalReceitas)}</td></tr>
                            <tr><td><strong>💸 Total de Despesas:</strong></td><td style="text-align:right; color:#800000;">${formatMoney(totalDespesas)}</td></tr>
                            <tr><td><strong>📌 Saldo do Período:</strong></td><td style="text-align:right; font-weight:bold;">${formatMoney(saldo)}</td></tr>
                        </table>
                    </div>
                    <h3>📋 Detalhamento das Despesas</h3>
                    <table>
                        <thead><tr><th>Descrição</th><th>Categoria</th><th>Data</th><th>Valor</th></tr></thead>
                        <tbody>${tabelaDespesas || '<tr><td colspan="4" style="text-align:center">Nenhuma despesa no período</td></tr>'}</tbody>
                    </table>
                    <h3>📊 Despesas por Categoria</h3>
                    <div class="chart-container">
                        <canvas id="graficoRelatorio"></canvas>
                    </div>
                    <div class="total-geral">Total de Despesas: ${formatMoney(totalDespesas)}</div>
                    <script>
                        const ctx = document.getElementById('graficoRelatorio').getContext('2d');
                        new Chart(ctx, {
                            type: 'pie',
                            data: {
                                labels: ${JSON.stringify(categoriasLabels)},
                                datasets: [{ data: ${JSON.stringify(categoriasValues)}, backgroundColor: ['#000080', '#800000', '#008080', '#808080', '#c0c0c0', '#4a4a4a', '#2a6a2a'] }]
                            },
                            options: { responsive: true, plugins: { legend: { position: 'bottom' } } }
                        });
                        window.onload = function() { setTimeout(function() { window.print(); setTimeout(function() { window.close(); }, 1000); }, 500); };
                    <\/script>
                </body>
                </html>
            `;
        }
        
        function imprimirRelatorioPeriodo() {
            let dataInicio = document.getElementById('dataInicio').value;
            let dataFim = document.getElementById('dataFim').value;
            if (!dataInicio || !dataFim) { alert('Selecione as datas inicial e final!'); return; }
            const html = gerarHTMLRelatorio(dataInicio, dataFim);
            const janela = window.open('', '_blank');
            janela.document.write(html);
            janela.document.close();
        }
        
        function exportarJSON() {
            const dados = { despesas, receitas };
            const json = JSON.stringify(dados, null, 2);
            const blob = new Blob([json], { type: 'application/json' });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = `ons_financas_backup_${getToday()}.json`;
            link.click();
            alert('Backup exportado!');
        }
        
        function importarJSON() {
            const input = document.getElementById('arquivoBackup');
            if (!input.files || !input.files[0]) { alert('Selecione um arquivo JSON!'); return; }
            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const dados = JSON.parse(e.target.result);
                    if (dados.despesas) despesas = dados.despesas;
                    if (dados.receitas) receitas = dados.receitas;
                    salvarDados();
                    renderizarDashboard();
                    alert('Backup importado!');
                } catch (err) { alert('Arquivo inválido!'); }
            };
            reader.readAsText(input.files[0]);
        }
        
        function limparTodosDados() {
            if (!confirm('⚠️ ATENÇÃO! Isso vai apagar TODOS os seus dados.\n\nTem certeza?')) return;
            despesas = { pessoal: [], naocategorizada: [], fixa: [] };
            receitas = [];
            salvarDados();
            renderizarDashboard();
            alert('Todos os dados foram apagados!');
        }
        
        function atualizarCategorias() {
            const tipo = document.getElementById('tipoDespesa').value;
            const select = document.getElementById('categoriaDespesa');
            select.innerHTML = '';
            categorias[tipo].forEach(cat => {
                const option = document.createElement('option');
                option.value = cat;
                option.text = cat;
                select.appendChild(option);
            });
        }
        
        // TABS
        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                document.querySelectorAll('.tab-pane').forEach(p => p.classList.remove('active'));
                this.classList.add('active');
                const tabId = this.getAttribute('data-tab');
                document.getElementById(tabId).classList.add('active');
                if (tabId === 'extrato') carregarExtrato();
                if (tabId === 'relatorio') {
                    if (!document.getElementById('dataFim').value) {
                        document.getElementById('dataFim').value = getToday();
                        document.getElementById('dataInicio').value = new Date(new Date().getFullYear(), new Date().getMonth(), 1).toISOString().split('T')[0];
                    }
                }
            });
        });
        
        // PWA
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js').catch(err => console.log('SW error:', err));
            });
        }
        
        // INICIALIZAÇÃO
        carregarDados();
        atualizarCategorias();
        renderizarDashboard();
    </script>
</body>
</html>
