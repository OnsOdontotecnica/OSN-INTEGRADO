<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>ONS Eletrotécnica - Mac OS Classic</title>
    <meta name="theme-color" content="#c0c0c0">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        @font-face {
            font-family: 'Chicago';
            src: local('Chicago'), local('Charcoal'), local('Helvetica Neue');
        }
        
        @font-face {
            font-family: 'Geneva';
            src: local('Geneva'), local('Helvetica');
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            cursor: default;
        }

        body {
            font-family: 'Chicago', 'Geneva', 'Helvetica Neue', monospace;
            background: #a0a0a0;
            min-height: 100vh;
            padding: 16px;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-image: linear-gradient(90deg, rgba(128,128,128,0.1) 1px, transparent 1px),
                              linear-gradient(0deg, rgba(128,128,128,0.1) 1px, transparent 1px);
            background-size: 8px 8px;
            pointer-events: none;
        }

        .app-container {
            max-width: 1400px;
            margin: 0 auto;
            position: relative;
            z-index: 1;
        }

        .menu-bar {
            background: #e8e8e8;
            border-top: 1px solid #ffffff;
            border-bottom: 1px solid #808080;
            padding: 5px 12px;
            display: flex;
            gap: 20px;
            margin-bottom: 16px;
            box-shadow: inset 0 1px 0 #ffffff;
        }

        .menu-item {
            font-family: 'Chicago', monospace;
            font-size: 12px;
            font-weight: bold;
            color: #000000;
            padding: 2px 8px;
            cursor: default;
        }

        .menu-item:hover {
            background: #000080;
            color: white;
        }

        .mac-window {
            background: #e8e8e8;
            border: 1px solid #000000;
            border-radius: 8px;
            box-shadow: 6px 6px 10px rgba(0,0,0,0.3);
            margin-bottom: 20px;
            overflow: hidden;
        }

        .window-title-bar {
            background: linear-gradient(180deg, #f0f0f0 0%, #c0c0c0 100%);
            border-bottom: 1px solid #808080;
            padding: 6px 10px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .window-controls {
            display: flex;
            gap: 5px;
            margin-right: 8px;
        }

        .window-btn {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, #ffffff, #b0b0b0);
            border: 1px solid #808080;
        }

        .window-btn.close { background: radial-gradient(circle at 30% 30%, #ff6b6b, #cc0000); }
        .window-btn.zoom { background: radial-gradient(circle at 30% 30%, #6bff6b, #00aa00); }
        .window-btn.collapse { background: radial-gradient(circle at 30% 30%, #ffff6b, #cccc00); }

        .window-title {
            font-family: 'Chicago', monospace;
            font-size: 11px;
            font-weight: bold;
            color: #000000;
            flex: 1;
        }

        .window-content {
            background: #ffffff;
            padding: 20px;
            border-top: 1px solid #ffffff;
            margin: 1px;
        }

        .mac-tabs {
            background: #e8e8e8;
            display: flex;
            gap: 0;
            border-bottom: 1px solid #808080;
            padding: 0 8px;
            margin-bottom: 1px;
            flex-wrap: wrap;
        }

        .tab-btn {
            background: linear-gradient(180deg, #d8d8d8 0%, #b8b8b8 100%);
            border: 1px solid #808080;
            border-bottom: none;
            border-top-left-radius: 6px;
            border-top-right-radius: 6px;
            padding: 8px 16px;
            font-family: 'Chicago', monospace;
            font-size: 10px;
            font-weight: bold;
            margin-right: 2px;
            margin-top: 3px;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            color: #000000;
        }

        .tab-btn.active {
            background: #ffffff;
            border-bottom: 1px solid #ffffff;
            margin-top: 0;
            padding: 9px 16px 8px 16px;
            position: relative;
            z-index: 1;
        }

        .tab-pane {
            display: none;
            background: #ffffff;
            padding: 0;
        }

        .tab-pane.active {
            display: block;
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
            gap: 16px;
        }

        .field-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        label {
            font-family: 'Chicago', monospace;
            font-size: 10px;
            font-weight: bold;
            color: #000000;
            text-transform: uppercase;
        }

        input, select, textarea {
            background: #ffffff;
            border: 1px solid #808080;
            border-radius: 3px;
            padding: 8px 10px;
            font-family: 'Geneva', monospace;
            font-size: 11px;
            outline: none;
            box-shadow: inset 1px 1px 2px rgba(0,0,0,0.1);
        }

        input:focus, select:focus, textarea:focus {
            border-color: #000080;
            background: #fffff0;
        }

        .mac-btn {
            background: linear-gradient(180deg, #e8e8e8 0%, #c0c0c0 100%);
            border: 1px solid #000000;
            border-radius: 4px;
            padding: 8px 20px;
            font-family: 'Chicago', monospace;
            font-size: 11px;
            font-weight: bold;
            color: #000000;
            cursor: pointer;
            box-shadow: inset 1px 1px 0 #ffffff, 1px 1px 0 #808080;
            transition: all 0.05s linear;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .mac-btn:active {
            box-shadow: inset 1px 1px 0 #808080, 1px 1px 0 #ffffff;
            transform: translate(1px, 1px);
        }

        .mac-btn-primary {
            background: linear-gradient(180deg, #d0d0d0 0%, #a0a0a0 100%);
        }

        .btn-group {
            display: flex;
            gap: 12px;
            margin-top: 20px;
            flex-wrap: wrap;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin-bottom: 25px;
        }

        .stat-card {
            background: #f0f0f0;
            border: 1px solid #c0c0c0;
            border-radius: 6px;
            padding: 16px;
            text-align: center;
            box-shadow: inset 1px 1px 0 #ffffff, 1px 1px 0 #a0a0a0;
        }

        .stat-card h3 {
            font-family: 'Chicago', monospace;
            font-size: 28px;
            font-weight: bold;
            color: #000000;
        }

        .stat-card p {
            font-family: 'Geneva', monospace;
            font-size: 10px;
            color: #444;
            margin-top: 5px;
        }

        .item-lista {
            padding: 12px;
            border-bottom: 1px solid #c0c0c0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }

        .item-lista:hover {
            background: #e8e8e8;
        }

        .item-acoes {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
        }

        .btn-acao {
            border: 1px solid #808080;
            border-radius: 3px;
            padding: 4px 10px;
            font-family: 'Chicago', monospace;
            font-size: 9px;
            font-weight: bold;
            cursor: pointer;
            background: #e8e8e8;
            box-shadow: inset 1px 1px 0 #ffffff;
        }

        .btn-acao:active {
            transform: translate(1px, 1px);
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(100,100,100,0.7);
            z-index: 10000;
            justify-content: center;
            align-items: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: #e8e8e8;
            border: 2px solid #000000;
            border-radius: 8px;
            max-width: 600px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
            box-shadow: 8px 8px 16px rgba(0,0,0,0.4);
        }

        .modal-header {
            background: linear-gradient(180deg, #f0f0f0 0%, #c0c0c0 100%);
            border-bottom: 1px solid #808080;
            padding: 10px 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .close-modal {
            background: #dc3545;
            border: 1px solid #000000;
            border-radius: 4px;
            color: white;
            width: 24px;
            height: 24px;
            cursor: pointer;
            font-weight: bold;
        }

        .toast-notify {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #e8e8e8;
            border: 1px solid #000000;
            border-radius: 6px;
            padding: 10px 20px;
            font-family: 'Chicago', monospace;
            font-size: 11px;
            font-weight: bold;
            z-index: 10001;
            box-shadow: 4px 4px 8px rgba(0,0,0,0.3);
        }

        ::-webkit-scrollbar {
            width: 16px;
            background: #c0c0c0;
        }

        ::-webkit-scrollbar-track {
            background: #c0c0c0;
            border-left: 1px solid #808080;
        }

        ::-webkit-scrollbar-thumb {
            background: #e8e8e8;
            border: 1px solid #808080;
            border-radius: 0;
        }

        .search-box {
            margin-bottom: 20px;
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .search-box input {
            flex: 1;
        }

        .status-bar {
            background: #e8e8e8;
            border-top: 1px solid #c0c0c0;
            border-bottom: 1px solid #808080;
            padding: 4px 12px;
            margin-top: 20px;
            display: flex;
            justify-content: space-between;
            font-family: 'Geneva', monospace;
            font-size: 9px;
            color: #000000;
        }

        .fatura-item {
            background: #f8f8f8;
            border: 1px solid #c0c0c0;
            border-radius: 6px;
            padding: 15px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
        }

        @media (max-width: 768px) {
            body { padding: 8px; }
            .window-content { padding: 12px; }
            .tab-btn { padding: 6px 10px; font-size: 8px; }
            .form-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
<div class="app-container">
    <div class="menu-bar">
        <span class="menu-item">🍎</span>
        <span class="menu-item">Arquivo</span>
        <span class="menu-item">Editar</span>
        <span class="menu-item">Módulos</span>
        <span class="menu-item">Janela</span>
        <span class="menu-item">Ajuda</span>
    </div>

    <div class="mac-window">
        <div class="window-title-bar">
            <div class="window-controls">
                <div class="window-btn close" onclick="if(confirm('Fechar módulo?')) window.location='index.html'"></div>
                <div class="window-btn collapse"></div>
                <div class="window-btn zoom"></div>
            </div>
            <div class="window-title">⚡ ONS Eletrotécnica - Manutenção Elétrica</div>
            <div>
                <a href="index.html" style="text-decoration: none;">
                    <button class="mac-btn" style="padding: 4px 12px; font-size: 9px;">⇄ Trocar Módulo</button>
                </a>
            </div>
        </div>

        <div class="mac-tabs">
            <button class="tab-btn active" data-tab="dashboard"><i class="fas fa-chart-line"></i> Dashboard</button>
            <button class="tab-btn" data-tab="clientes"><i class="fas fa-users"></i> Clientes</button>
            <button class="tab-btn" data-tab="novaos"><i class="fas fa-plus-circle"></i> Nova OS</button>
            <button class="tab-btn" data-tab="historico"><i class="fas fa-history"></i> Histórico</button>
            <button class="tab-btn" data-tab="orcamento"><i class="fas fa-file-invoice"></i> Orçamento</button>
            <button class="tab-btn" data-tab="relatorios"><i class="fas fa-chart-bar"></i> Relatórios</button>
            <button class="tab-btn" data-tab="faturamento"><i class="fas fa-file-invoice-dollar"></i> Faturamento</button>
        </div>

        <div class="window-content">
            <!-- DASHBOARD -->
            <div id="dashboard" class="tab-pane active">
                <div class="stats-grid" id="statsDashboard">
                    <div class="stat-card"><h3 id="totalClientes">0</h3><p>Clientes</p></div>
                    <div class="stat-card"><h3 id="totalOS">0</h3><p>Ordens Serviço</p></div>
                    <div class="stat-card"><h3 id="totalFinalizadas">0</h3><p>Finalizadas</p></div>
                    <div class="stat-card"><h3 id="totalFaturado">R$0</h3><p>Faturado</p></div>
                </div>
                <div style="margin-top: 20px;">
                    <h3 style="font-family: 'Chicago'; font-size: 12px; margin-bottom: 10px;"><i class="fas fa-clock"></i> Últimas OS</h3>
                    <div id="ultimasOS"></div>
                </div>
            </div>

            <!-- CLIENTES -->
            <div id="clientes" class="tab-pane">
                <div class="form-grid">
                    <div class="field-group"><label><i class="fas fa-user"></i> Nome *</label><input type="text" id="cliNome" placeholder="Ex: João Silva"></div>
                    <div class="field-group"><label><i class="fas fa-phone"></i> Telefone *</label><input type="text" id="cliTelefone" placeholder="(35) 9 9999-9999"></div>
                    <div class="field-group"><label><i class="fas fa-envelope"></i> Email</label><input type="email" id="cliEmail"></div>
                    <div class="field-group"><label><i class="fas fa-map-marker-alt"></i> Endereço</label><input type="text" id="cliEndereco"></div>
                </div>
                <div class="btn-group">
                    <button class="mac-btn mac-btn-primary" onclick="salvarCliente()"><i class="fas fa-save"></i> Salvar</button>
                    <button class="mac-btn" onclick="limparFormCliente()"><i class="fas fa-eraser"></i> Limpar</button>
                </div>
                <div style="margin-top: 30px;">
                    <div class="search-box"><input type="text" id="searchCliente" placeholder="🔍 Buscar cliente..." onkeyup="filtrarClientes()"></div>
                    <div id="listaClientes"></div>
                </div>
            </div>

            <!-- NOVA OS -->
            <div id="novaos" class="tab-pane">
                <div class="form-grid">
                    <div class="field-group"><label><i class="fas fa-user"></i> Cliente *</label><select id="osCliente"><option value="">Selecione</option></select></div>
                    <div class="field-group"><label><i class="fas fa-bolt"></i> Equipamento *</label><input type="text" id="osEquipamento" placeholder="Ex: Quadro Geral"></div>
                    <div class="field-group"><label><i class="fas fa-exclamation-triangle"></i> Defeito</label><textarea id="osDefeito" rows="3"></textarea></div>
                    <div class="field-group"><label><i class="fas fa-check-circle"></i> Solução</label><textarea id="osSolucao" rows="3"></textarea></div>
                    <div class="field-group"><label><i class="fas fa-dollar-sign"></i> Valor (R$)</label><input type="text" id="osValor" placeholder="0,00"></div>
                </div>
                <div class="btn-group">
                    <button class="mac-btn mac-btn-primary" onclick="salvarOS()"><i class="fas fa-save"></i> Salvar OS</button>
                    <button class="mac-btn" onclick="limparOS()"><i class="fas fa-trash"></i> Limpar</button>
                </div>
            </div>

            <!-- HISTÓRICO -->
            <div id="historico" class="tab-pane">
                <div class="search-box"><input type="text" id="searchHistorico" placeholder="🔍 Buscar OS..." onkeyup="filtrarHistorico()"></div>
                <div id="listaHistorico"></div>
            </div>

            <!-- ORÇAMENTO -->
            <div id="orcamento" class="tab-pane">
                <div id="orcamentoContent"></div>
            </div>

            <!-- RELATÓRIOS -->
            <div id="relatorios" class="tab-pane">
                <div id="relatoriosContent"></div>
            </div>

            <!-- FATURAMENTO -->
            <div id="faturamento" class="tab-pane">
                <div id="faturamentoContent"></div>
            </div>
        </div>

        <div class="status-bar">
            <span>💾 Dados sincronizados</span>
            <span>⚡ Módulo Elétrica v2.0</span>
            <span>📅 1995 - ONS Sistemas</span>
        </div>
    </div>
</div>

<div id="modalOS" class="modal">
    <div class="modal-content">
        <div class="modal-header">
            <h3 style="font-family: 'Chicago';">📋 Detalhes da OS</h3>
            <button class="close-modal" onclick="fecharModal()">✕</button>
        </div>
        <div style="padding: 20px;" id="modalBody"></div>
    </div>
</div>

<div id="modalFatura" class="modal">
    <div class="modal-content">
        <div class="modal-header">
            <h3 style="font-family: 'Chicago';">💰 Gerar Fatura</h3>
            <button class="close-modal" onclick="fecharModalFatura()">✕</button>
        </div>
        <div style="padding: 20px;" id="modalFaturaBody"></div>
    </div>
</div>

<script>
    const SUPABASE_URL = 'https://vckyxwonbpkdeqeoswxc.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZja3l4d29uYnBrZGVxZW9zd3hjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYwMTY5NjMsImV4cCI6MjA5MTU5Mjk2M30.b5ni_vnIETHVuOs5Cy4982UUBq9Icm-Zc12W1FwQyvI';
    const MODULO = 'eletrica';
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    
    let clientes = [], ordensServico = [], faturas = [];
    let clientesFiltrados = [], osFiltradas = [];

    function mostrarToast(msg, tipo = 'sucesso') {
        const toast = document.createElement('div');
        toast.className = 'toast-notify';
        toast.style.background = tipo === 'sucesso' ? '#d4e8d4' : '#e8d4d4';
        toast.style.borderLeft = tipo === 'sucesso' ? '4px solid #28a745' : '4px solid #dc3545';
        toast.innerHTML = `<i class="fas ${tipo === 'sucesso' ? 'fa-check-circle' : 'fa-exclamation-circle'}" style="margin-right: 8px;"></i> ${msg}`;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 3000);
    }

    function formatMoney(v) { 
        if (!v) return 'R$ 0,00';
        return new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL' }).format(v); 
    }
    
    function parseMoney(str) { 
        if (!str) return 0; 
        return parseFloat(str.replace(/\./g, '').replace(',', '.').replace(/[^\d.-]/g, '')) || 0; 
    }
    
    function formatarTelefone(v) { 
        v = v.replace(/\D/g, ''); 
        if (v.length <= 10) v = v.replace(/(\d{2})(\d{4})(\d{0,4})/, '($1) $2-$3'); 
        else v = v.replace(/(\d{2})(\d{5})(\d{0,4})/, '($1) $2-$3'); 
        return v; 
    }

    // ========== CLIENTES ==========
    async function carregarClientes() {
        try {
            const { data } = await supabase.from('clientes').select('*').eq('modulo', MODULO).order('nome');
            clientes = data || [];
            clientesFiltrados = [...clientes];
            renderizarClientes();
            carregarSelectClientes();
            atualizarDashboard();
        } catch(e) { carregarClientesLocal(); }
    }

    function carregarClientesLocal() { 
        const saved = localStorage.getItem('ons_eletrica_clientes'); 
        if(saved) clientes = JSON.parse(saved);
        clientesFiltrados = [...clientes];
        renderizarClientes(); 
        carregarSelectClientes(); 
    }
    
    function salvarClientesLocal() { localStorage.setItem('ons_eletrica_clientes', JSON.stringify(clientes)); }

    async function salvarCliente() {
        const nome = document.getElementById('cliNome').value.trim();
        const telefone = document.getElementById('cliTelefone').value.trim();
        if (!nome || !telefone) { mostrarToast('Preencha nome e telefone!', 'erro'); return; }
        const novoCliente = { nome, telefone, email: document.getElementById('cliEmail').value, endereco: document.getElementById('cliEndereco').value, modulo: MODULO, data_cadastro: new Date().toISOString() };
        try {
            await supabase.from('clientes').insert([novoCliente]);
            mostrarToast('Cliente salvo com sucesso!', 'sucesso');
            limparFormCliente();
            carregarClientes();
        } catch(e) { 
            novoCliente.id = Date.now();
            clientes.push(novoCliente); 
            salvarClientesLocal(); 
            mostrarToast('Salvo localmente!', 'sucesso'); 
            renderizarClientes(); 
            carregarSelectClientes(); 
        }
    }

    function renderizarClientes() {
        const container = document.getElementById('listaClientes');
        if (!container) return;
        if (clientesFiltrados.length === 0) { container.innerHTML = '<div class="item-lista">📁 Nenhum cliente cadastrado</div>'; return; }
        container.innerHTML = '';
        clientesFiltrados.forEach(c => { 
            container.innerHTML += `<div class="item-lista">
                <div><strong>${c.nome}</strong><br><small style="font-family: Geneva;">📞 ${c.telefone}</small></div>
                <div class="item-acoes">
                    <button class="btn-acao" onclick="editarCliente(${c.id})"><i class="fas fa-edit"></i> Editar</button>
                    <button class="btn-acao" onclick="excluirCliente(${c.id})"><i class="fas fa-trash"></i> Excluir</button>
                </div>
            </div>`; 
        });
    }

    function filtrarClientes() {
        const termo = document.getElementById('searchCliente').value.toLowerCase();
        clientesFiltrados = clientes.filter(c => c.nome.toLowerCase().includes(termo) || (c.telefone && c.telefone.includes(termo)));
        renderizarClientes();
    }

    async function excluirCliente(id) {
        if (!confirm('Tem certeza que deseja excluir este cliente? Todas as OS associadas também serão removidas.')) return;
        try {
            await supabase.from('clientes').delete().eq('id', id);
            await supabase.from('ordens_servico').delete().eq('cliente_id', id);
            mostrarToast('Cliente excluído!', 'sucesso');
            carregarClientes();
            carregarOS();
        } catch(e) {
            clientes = clientes.filter(c => c.id !== id);
            ordensServico = ordensServico.filter(o => o.cliente_id !== id);
            salvarClientesLocal();
            localStorage.setItem('ons_eletrica_os', JSON.stringify(ordensServico));
            renderizarClientes();
            carregarOS();
            mostrarToast('Excluído localmente!', 'sucesso');
        }
    }

    function editarCliente(id) {
        const cliente = clientes.find(c => c.id === id);
        if (cliente) {
            document.getElementById('cliNome').value = cliente.nome;
            document.getElementById('cliTelefone').value = cliente.telefone;
            document.getElementById('cliEmail').value = cliente.email || '';
            document.getElementById('cliEndereco').value = cliente.endereco || '';
            mostrarToast('Editando cliente - clique em Salvar após as alterações', 'sucesso');
        }
    }

    function limparFormCliente() { 
        document.getElementById('cliNome').value = ''; 
        document.getElementById('cliTelefone').value = ''; 
        document.getElementById('cliEmail').value = ''; 
        document.getElementById('cliEndereco').value = ''; 
    }
    
    function carregarSelectClientes() { 
        const s = document.getElementById('osCliente'); 
        if(s) { 
            s.innerHTML = '<option value="">📋 Selecione um cliente</option>'; 
            clientes.forEach(c => s.innerHTML += `<option value="${c.id}">${c.nome}</option>`); 
        } 
    }

    // ========== ORDENS DE SERVIÇO ==========
    async function salvarOS() {
        const clienteId = document.getElementById('osCliente').value;
        const equipamento = document.getElementById('osEquipamento').value.trim();
        if (!clienteId || !equipamento) { mostrarToast('Preencha cliente e equipamento!', 'erro'); return; }
        const valor = parseMoney(document.getElementById('osValor').value);
        const novaOS = { 
            cliente_id: parseInt(clienteId), 
            equipamento, 
            defeito: document.getElementById('osDefeito').value, 
            solucao: document.getElementById('osSolucao').value, 
            modulo: MODULO, 
            status: 'aberto', 
            valor: valor,
            data_abertura: new Date().toISOString() 
        };
        try {
            await supabase.from('ordens_servico').insert([novaOS]);
            mostrarToast('OS salva com sucesso!', 'sucesso');
            limparOS();
            carregarOS();
        } catch(e) { 
            novaOS.id = Date.now(); 
            ordensServico.push(novaOS); 
            localStorage.setItem('ons_eletrica_os', JSON.stringify(ordensServico)); 
            mostrarToast('Salva localmente!', 'sucesso'); 
            limparOS(); 
            carregarOS(); 
        }
    }

    async function carregarOS() {
        try {
            const { data } = await supabase.from('ordens_servico').select('*, clientes(nome)').eq('modulo', MODULO).order('data_abertura', { ascending: false });
            ordensServico = data || [];
            osFiltradas = [...ordensServico];
            renderizarHistorico();
            atualizarDashboard();
            carregarOrcamento();
            carregarFaturas();
        } catch(e) { 
            const saved = localStorage.getItem('ons_eletrica_os'); 
            if(saved) ordensServico = JSON.parse(saved);
            const savedFaturas = localStorage.getItem('ons_eletrica_faturas');
            if(savedFaturas) faturas = JSON.parse(savedFaturas);
            osFiltradas = [...ordensServico];
            renderizarHistorico(); 
            carregarOrcamento();
            carregarFaturas();
        }
    }

    function renderizarHistorico() {
        const container = document.getElementById('listaHistorico');
        if (!container) return;
        if (osFiltradas.length === 0) { container.innerHTML = '<div class="item-lista">📁 Nenhuma OS encontrada</div>'; return; }
        container.innerHTML = '';
        osFiltradas.forEach(os => { 
            const clienteNome = os.clientes?.nome || clientes.find(c => c.id === os.cliente_id)?.nome || 'N/A';
            container.innerHTML += `<div class="item-lista">
                <div>
                    <strong>#${os.id}</strong> - ${clienteNome}<br>
                    <small style="font-family: Geneva;">⚡ ${os.equipamento} | 💰 ${formatMoney(os.valor)}</small>
                </div>
                <div class="item-acoes">
                    <button class="btn-acao" onclick="verOS(${os.id})"><i class="fas fa-eye"></i> Ver</button>
                    <button class="btn-acao" onclick="enviarOSWhatsApp(${os.id})"><i class="fab fa-whatsapp"></i> WhatsApp</button>
                    <button class="btn-acao" onclick="excluirOS(${os.id})"><i class="fas fa-trash"></i> Excluir</button>
                </div>
            </div>`; 
        });
    }

    function filtrarHistorico() {
        const termo = document.getElementById('searchHistorico').value.toLowerCase();
        osFiltradas = ordensServico.filter(os => {
            const clienteNome = os.clientes?.nome || clientes.find(c => c.id === os.cliente_id)?.nome || '';
            return os.id.toString().includes(termo) || 
                   clienteNome.toLowerCase().includes(termo) ||
                   os.equipamento.toLowerCase().includes(termo);
        });
        renderizarHistorico();
    }

    function limparOS() { 
        document.getElementById('osCliente').value = ''; 
        document.getElementById('osEquipamento').value = ''; 
        document.getElementById('osDefeito').value = ''; 
        document.getElementById('osSolucao').value = ''; 
        document.getElementById('osValor').value = '';
    }

    async function verOS(id) { 
        const os = ordensServico.find(o => o.id === id); 
        const cliente = clientes.find(c => c.id === os?.cliente_id); 
        document.getElementById('modalBody').innerHTML = `
            <p><strong>⚡ OS #${id}</strong></p>
            <p><strong>👤 Cliente:</strong> ${cliente?.nome}</p>
            <p><strong>📞 Telefone:</strong> ${cliente?.telefone || 'N/A'}</p>
            <p><strong>🔌 Equipamento:</strong> ${os?.equipamento}</p>
            <p><strong>⚠️ Defeito:</strong> ${os?.defeito || 'N/A'}</p>
            <p><strong>✅ Solução:</strong> ${os?.solucao || 'N/A'}</p>
            <p><strong>💰 Valor:</strong> ${formatMoney(os?.valor)}</p>
            <p><strong>📅 Data:</strong> ${new Date(os?.data_abertura).toLocaleString()}</p>
            <p><strong>📌 Status:</strong> ${os?.status === 'aberto' ? '🟡 Em aberto' : '🟢 Finalizado'}</p>
        `;
        document.getElementById('modalOS').classList.add('active'); 
    }

    async function excluirOS(id) { 
        if (!confirm('Excluir esta OS permanentemente?')) return; 
        try { 
            await supabase.from('ordens_servico').delete().eq('id', id); 
            mostrarToast('OS excluída!', 'sucesso'); 
            carregarOS(); 
        } catch(e) { 
            ordensServico = ordensServico.filter(o => o.id !== id); 
            localStorage.setItem('ons_eletrica_os', JSON.stringify(ordensServico)); 
            renderizarHistorico(); 
            mostrarToast('Excluída localmente!', 'sucesso'); 
        } 
        atualizarDashboard(); 
    }

    function enviarOSWhatsApp(id) { 
        const os = ordensServico.find(o => o.id === id); 
        const cliente = clientes.find(c => c.id === os?.cliente_id); 
        if (!cliente?.telefone) { mostrarToast('Telefone não encontrado!', 'erro'); return; } 
        const msg = `⚡ ONS Eletrotécnica\n\nOS #${id}\nCliente: ${cliente.nome}\nEquipamento: ${os.equipamento}\nDefeito: ${os.defeito || 'N/A'}\nValor: ${formatMoney(os.valor)}\n\nPara mais informações, entre em contato.`;
        window.open(`https://wa.me/55${cliente.telefone.replace(/\D/g, '')}?text=${encodeURIComponent(msg)}`, '_blank'); 
    }

    // ========== ORÇAMENTO ==========
    function carregarOrcamento() {
        const container = document.getElementById('orcamentoContent');
        if (!container) return;
        const osEmAberto = ordensServico.filter(o => o.status === 'aberto');
        if (osEmAberto.length === 0) {
            container.innerHTML = '<div class="item-lista">📁 Nenhuma OS em aberto para orçamento</div>';
            return;
        }
        container.innerHTML = '<div class="stats-grid" style="margin-bottom: 20px;">' + osEmAberto.map(os => {
            const cliente = clientes.find(c => c.id === os.cliente_id);
            return `<div class="stat-card"><strong>OS #${os.id}</strong><br>${cliente?.nome}<br>${os.equipamento}<br><span style="font-size: 18px;">${formatMoney(os.valor)}</span><br><button class="mac-btn" style="margin-top: 10px; padding: 4px 12px;" onclick="finalizarOS(${os.id})"><i class="fas fa-check"></i> Finalizar</button></div>`;
        }).join('') + '</div>';
    }

    async function finalizarOS(id) {
        const valor = prompt('Digite o valor final da OS (R$):', '0,00');
        if (valor === null) return;
        try {
            await supabase.from('ordens_servico').update({ status: 'finalizado', valor: parseMoney(valor) }).eq('id', id);
            mostrarToast('OS finalizada com sucesso!', 'sucesso');
            carregarOS();
        } catch(e) {
            const os = ordensServico.find(o => o.id === id);
            if (os) {
                os.status = 'finalizado';
                os.valor = parseMoney(valor);
                localStorage.setItem('ons_eletrica_os', JSON.stringify(ordensServico));
                mostrarToast('Finalizada localmente!', 'sucesso');
                carregarOS();
            }
        }
    }

    // ========== FATURAMENTO ==========
    function carregarFaturas() {
        const container = document.getElementById('faturamentoContent');
        if (!container) return;
        
        const osFinalizadas = ordensServico.filter(o => o.status === 'finalizado');
        
        container.innerHTML = `
            <div class="stats-grid">
                <div class="stat-card"><h3>${osFinalizadas.length}</h3><p>OS Finalizadas</p></div>
                <div class="stat-card"><h3>${formatMoney(osFinalizadas.reduce((acc, o) => acc + (o.valor || 0), 0))}</h3><p>Total a Faturar</p></div>
            </div>
            <div class="btn-group" style="margin-bottom: 20px;">
                <button class="mac-btn mac-btn-primary" onclick="abrirNovaFatura()"><i class="fas fa-plus"></i> Nova Fatura</button>
            </div>
            <div id="listaFaturas"></div>
        `;
        
        renderizarListaFaturas();
    }

    function renderizarListaFaturas() {
        const container = document.getElementById('listaFaturas');
        if (!container) return;
        
        if (faturas.length === 0) {
            container.innerHTML = '<div class="item-lista">📁 Nenhuma fatura gerada</div>';
            return;
        }
        
        container.innerHTML = '';
        faturas.forEach(f => {
            const os = ordensServico.find(o => o.id === f.os_id);
            const cliente = clientes.find(c => c.id === os?.cliente_id);
            container.innerHTML += `<div class="fatura-item">
                <div><strong>${f.numero_documento}</strong><br><small>OS #${f.os_id} - ${cliente?.nome}</small><br><small>Valor: ${formatMoney(os?.valor)}</small></div>
                <div><span style="background: #f0f0f0; padding: 4px 8px; border-radius: 4px;">${f.forma_pagamento}</span><br><small>${new Date(f.data_emissao).toLocaleDateString()}</small></div>
                <div><button class="btn-acao" onclick="excluirFatura('${f.id}')"><i class="fas fa-trash"></i> Excluir</button></div>
            </div>`;
        });
    }

    function abrirNovaFatura() {
        const osFinalizadas = ordensServico.filter(o => o.status === 'finalizado' && !faturas.some(f => f.os_id === o.id));
        if (osFinalizadas.length === 0) {
            mostrarToast('Não há OS finalizadas disponíveis para faturar!', 'erro');
            return;
        }
        
        document.getElementById('modalFaturaBody').innerHTML = `
            <div class="field-group"><label>Selecione a OS</label>
                <select id="faturaOS">${osFinalizadas.map(os => {
                    const c = clientes.find(c => c.id === os.cliente_id);
                    return `<option value="${os.id}">OS #${os.id} - ${c?.nome} - ${formatMoney(os.valor)}</option>`;
                }).join('')}</select>
            </div>
            <div class="field-group"><label>Número do Documento</label><input type="text" id="numDocumento" value="FAT-${new Date().getFullYear()}${String(new Date().getMonth()+1).padStart(2,'0')}-${String(faturas.length+1).padStart(3,'0')}"></div>
            <div class="field-group"><label>Forma de Pagamento</label>
                <select id="formaPagamento"><option>À Vista</option><option>Cartão de Crédito</option><option>PIX</option><option>Boleto</option><option>Transferência</option></select>
            </div>
            <div class="btn-group"><button class="mac-btn mac-btn-primary" onclick="salvarFatura()"><i class="fas fa-save"></i> Gerar Fatura</button></div>
        `;
        document.getElementById('modalFatura').classList.add('active');
    }

    function salvarFatura() {
        const osId = document.getElementById('faturaOS').value;
        if (!osId) { mostrarToast('Selecione uma OS!', 'erro'); return; }
        const novaFatura = { 
            id: Date.now(),
            os_id: parseInt(osId), 
            modulo: MODULO, 
            numero_documento: document.getElementById('numDocumento').value, 
            forma_pagamento: document.getElementById('formaPagamento').value, 
            status: 'EM ABERTO', 
            data_emissao: new Date().toISOString() 
        };
        faturas.push(novaFatura);
        localStorage.setItem('ons_eletrica_faturas', JSON.stringify(faturas));
        mostrarToast('Fatura gerada com sucesso!', 'sucesso');
        fecharModalFatura();
        carregarFaturas();
    }

    function excluirFatura(id) {
        if (!confirm('Excluir esta fatura?')) return;
        faturas = faturas.filter(f => f.id != id);
        localStorage.setItem('ons_eletrica_faturas', JSON.stringify(faturas));
        mostrarToast('Fatura excluída!', 'sucesso');
        carregarFaturas();
    }

    function fecharModalFatura() { document.getElementById('modalFatura').classList.remove('active'); }

    // ========== RELATÓRIOS ==========
    function gerarRelatorios() { 
        const totalFaturado = ordensServico.filter(o => o.status === 'finalizado').reduce((acc, o) => acc + (o.valor || 0), 0);
        document.getElementById('relatoriosContent').innerHTML = `
            <div class="stats-grid">
                <div class="stat-card"><h3>${ordensServico.length}</h3><p>Total OS</p></div>
                <div class="stat-card"><h3>${clientes.length}</h3><p>Clientes</p></div>
                <div class="stat-card"><h3>${ordensServico.filter(o => o.status === 'finalizado').length}</h3><p>Finalizadas</p></div>
                <div class="stat-card"><h3>${formatMoney(totalFaturado)}</h3><p>Total Faturado</p></div>
                <div class="stat-card"><h3>${faturas.length}</h3><p>Faturas Emitidas</p></div>
            </div>
            <div class="btn-group">
                <button class="mac-btn mac-btn-primary" onclick="exportarRelatorio()"><i class="fas fa-download"></i> Exportar Relatório Completo</button>
            </div>
        `; 
    }

    function exportarRelatorio() { 
        let texto = `RELATÓRIO ONS ELETROTÉCNICA\n${new Date().toLocaleString()}\n${'='.repeat(50)}\n\nTotal OS: ${ordensServico.length}\nTotal Finalizadas: ${ordensServico.filter(o => o.status === 'finalizado').length}\nTotal Faturas: ${faturas.length}\n\nDETALHAMENTO:\n`;
        ordensServico.forEach(os => { 
            const c = clientes.find(c => c.id === os.cliente_id); 
            texto += `\nOS #${os.id} | ${c?.nome} | ${os.equipamento} | Status: ${os.status} | Valor: ${formatMoney(os.valor)}\n`; 
        }); 
        texto += `\n${'='.repeat(50)}\nFATURAS EMITIDAS:\n`;
        faturas.forEach(f => {
            const os = ordensServico.find(o => o.id === f.os_id);
            const c = clientes.find(c => c.id === os?.cliente_id);
            texto += `\n${f.numero_documento} | ${c?.nome} | ${f.forma_pagamento} | ${formatMoney(os?.valor)}\n`;
        });
        const blob = new Blob([texto], { type: 'text/plain' }); 
        const link = document.createElement('a'); 
        link.href = URL.createObjectURL(blob); 
        link.download = `relatorio_eletrica_${new Date().toISOString().slice(0,10)}.txt`; 
        link.click(); 
        mostrarToast('Relatório exportado!', 'sucesso'); 
    }

    // ========== DASHBOARD ==========
    async function atualizarDashboard() { 
        document.getElementById('totalClientes').innerHTML = clientes.length; 
        document.getElementById('totalOS').innerHTML = ordensServico.length; 
        document.getElementById('totalFinalizadas').innerHTML = ordensServico.filter(o => o.status === 'finalizado').length; 
        const totalFaturado = ordensServico.filter(o => o.status === 'finalizado').reduce((acc, o) => acc + (o.valor || 0), 0);
        document.getElementById('totalFaturado').innerHTML = formatMoney(totalFaturado);
        
        const ultimas = ordensServico.slice(0, 5); 
        const container = document.getElementById('ultimasOS'); 
        if (container) { 
            if (ultimas.length === 0) container.innerHTML = '<div class="item-lista">📁 Nenhuma OS recente</div>'; 
            else { 
                container.innerHTML = ''; 
                ultimas.forEach(os => { 
                    const c = clientes.find(c => c.id === os.cliente_id); 
                    container.innerHTML += `<div class="item-lista">
                        <div><strong>${c?.nome || 'N/A'}</strong> - ${os.equipamento}<br><small>📅 ${new Date(os.data_abertura).toLocaleDateString()} | 💰 ${formatMoney(os.valor)}</small></div>
                        <button class="btn-acao" onclick="verOS(${os.id})"><i class="fas fa-eye"></i> Ver</button>
                    </div>`; 
                }); 
            } 
        } 
    }

    // ========== GERAL ==========
    function fecharModal() { document.getElementById('modalOS').classList.remove('active'); }

    document.querySelectorAll('.tab-btn').forEach(btn => { 
        btn.addEventListener('click', () => { 
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active')); 
            document.querySelectorAll('.tab-pane').forEach(p => p.classList.remove('active')); 
            btn.classList.add('active'); 
            const tabId = btn.getAttribute('data-tab'); 
            document.getElementById(tabId).classList.add('active'); 
            if (tabId === 'relatorios') gerarRelatorios(); 
            if (tabId === 'orcamento') carregarOrcamento();
            if (tabId === 'faturamento') carregarFaturas();
        }); 
    });

    document.getElementById('cliTelefone')?.addEventListener('input', e => e.target.value = formatarTelefone(e.target.value));
    document.getElementById('osValor')?.addEventListener('input', e => {
        let v = e.target.value.replace(/\D/g, '');
        v = (parseInt(v) / 100).toFixed(2);
        e.target.value = v.replace('.', ',');
    });

    carregarClientes();
    carregarOS();
    console.log('⚡ ONS Eletrotécnica - Modo Mac OS Classic ativado!');
    console.log('   ✅ Todas as funções operacionais');
    console.log('   💾 Dados sincronizados com Supabase');
    console.log('   💰 Módulo de faturamento integrado');
</script>
</body>
</html>
