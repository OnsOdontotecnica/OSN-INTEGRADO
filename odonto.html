<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>ONS Odontotecnica - Windows 95 Classic</title>
    <meta name="theme-color" content="#008080">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="ONS Odonto">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="description" content="Sistema Técnico de Manutenção de Equipamentos Odontológicos + Orçamentos">
    
    <link rel="manifest" href="./manifest.json">            
    <link rel="apple-touch-icon" href="icons/icon-192.png">
    <link rel="icon" type="image/png" sizes="32x32" href="icons/icon-32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="icons/icon-16.png">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Microsoft Sans Serif', 'MS Sans Serif', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #008080;
            min-height: 100vh;
            padding: 12px;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-image: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><circle cx="2" cy="2" r="1.5" fill="rgba(0,0,0,0.08)"/><circle cx="20" cy="18" r="1.5" fill="rgba(0,0,0,0.08)"/><circle cx="15" cy="5" r="1" fill="rgba(0,0,0,0.08)"/><circle cx="5" cy="20" r="1" fill="rgba(0,0,0,0.08)"/></svg>');
            background-repeat: repeat;
            pointer-events: none;
        }

        .app-container {
            max-width: 1400px;
            margin: 0 auto;
            position: relative;
            z-index: 1;
        }

        /* Janela Windows 95 */
        .win95-window {
            background: #c0c0c0;
            border: 2px solid;
            border-top-color: #ffffff;
            border-left-color: #ffffff;
            border-right-color: #808080;
            border-bottom-color: #808080;
            margin-bottom: 16px;
            box-shadow: 3px 3px 8px rgba(0,0,0,0.3);
        }

        .win95-title-bar {
            background: #000080;
            padding: 5px 8px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            cursor: default;
        }

        .win95-title-bar-text {
            color: white;
            font-weight: bold;
            font-size: 11px;
            letter-spacing: 1px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .win95-title-buttons {
            display: flex;
            gap: 2px;
        }

        .win95-title-btn {
            background: #c0c0c0;
            border: 2px solid;
            border-top-color: #ffffff;
            border-left-color: #ffffff;
            border-right-color: #808080;
            border-bottom-color: #808080;
            width: 18px;
            height: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 9px;
            font-weight: bold;
        }

        .win95-body {
            background: #c0c0c0;
            padding: 16px;
            border-top: 1px solid #dfdfdf;
        }

        /* Menu de abas estilo Windows */
        .win95-tabs {
            background: #c0c0c0;
            display: flex;
            gap: 2px;
            border-bottom: 1px solid #808080;
            padding: 4px 8px 0 8px;
            flex-wrap: wrap;
        }

        .tab-btn {
            background: #c0c0c0;
            border: 2px solid;
            border-top-color: #ffffff;
            border-left-color: #ffffff;
            border-right-color: #808080;
            border-bottom-color: #808080;
            padding: 6px 14px;
            font-family: 'Microsoft Sans Serif', sans-serif;
            font-size: 10px;
            font-weight: bold;
            margin-right: 2px;
            margin-bottom: 0;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 5px;
        }

        .tab-btn.active {
            background: #ffffff;
            border-bottom: 1px solid #ffffff;
            padding-bottom: 7px;
            position: relative;
            z-index: 1;
        }

        .tab-pane {
            display: none;
            background: #c0c0c0;
            padding: 16px;
        }

        .tab-pane.active {
            display: block;
        }

        /* Botões Windows 95 */
        .win95-btn {
            background: #c0c0c0;
            border: 2px solid;
            border-top-color: #ffffff;
            border-left-color: #ffffff;
            border-right-color: #808080;
            border-bottom-color: #808080;
            padding: 6px 16px;
            font-family: 'Microsoft Sans Serif', sans-serif;
            font-size: 11px;
            font-weight: bold;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            transition: none;
        }

        .win95-btn:active {
            border-top-color: #808080;
            border-left-color: #808080;
            border-right-color: #ffffff;
            border-bottom-color: #ffffff;
            transform: translate(1px, 1px);
        }

        .win95-btn-primary {
            background: #000080;
            color: white;
            border-top-color: #4a4aff;
            border-left-color: #4a4aff;
        }

        .btn-acao {
            background: #c0c0c0;
            border: 2px solid;
            border-top-color: #ffffff;
            border-left-color: #ffffff;
            border-right-color: #808080;
            border-bottom-color: #808080;
            padding: 4px 12px;
            font-family: 'Microsoft Sans Serif', sans-serif;
            font-size: 9px;
            font-weight: bold;
            cursor: pointer;
            margin: 2px;
        }

        .btn-acao:active {
            border-top-color: #808080;
            border-left-color: #808080;
            border-right-color: #ffffff;
            border-bottom-color: #ffffff;
        }

        .btn-group {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-top: 16px;
        }

        /* Formulários estilo Windows */
        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 12px;
            margin-bottom: 16px;
        }

        .field-group {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        label {
            font-family: 'Microsoft Sans Serif', sans-serif;
            font-size: 10px;
            font-weight: bold;
            color: #000000;
        }

        input, select, textarea {
            background: #ffffff;
            border: 2px solid;
            border-top-color: #808080;
            border-left-color: #808080;
            border-right-color: #ffffff;
            border-bottom-color: #ffffff;
            padding: 6px 8px;
            font-family: 'Microsoft Sans Serif', sans-serif;
            font-size: 11px;
            outline: none;
        }

        input:focus, select:focus, textarea:focus {
            border: 2px solid #000080;
        }

        /* Cards de estatísticas */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 12px;
            margin-bottom: 20px;
        }

        .stat-card {
            background: #c0c0c0;
            border: 2px solid;
            border-top-color: #ffffff;
            border-left-color: #ffffff;
            border-right-color: #808080;
            border-bottom-color: #808080;
            padding: 12px;
            text-align: center;
        }

        .stat-card h3 {
            font-size: 24px;
            font-weight: bold;
            color: #000000;
        }

        .stat-card p {
            font-size: 9px;
            color: #333;
            margin-top: 4px;
        }

        /* Listas */
        .lista-container {
            max-height: 500px;
            overflow-y: auto;
            margin-top: 12px;
            border: 2px inset #808080;
            background: #ffffff;
        }

        .item-lista {
            padding: 12px;
            border-bottom: 1px solid #c0c0c0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
            background: #ffffff;
        }

        .item-lista:hover {
            background: #e0e0e0;
        }

        .item-lista-info h4 {
            font-size: 11px;
            font-weight: bold;
            color: #000000;
            margin-bottom: 4px;
        }

        .item-lista-info p {
            font-size: 9px;
            color: #444;
        }

        .item-lista-acoes {
            display: flex;
            gap: 5px;
            flex-wrap: wrap;
        }

        /* Status badges */
        .status-badge {
            font-size: 8px;
            padding: 2px 8px;
            border: 1px solid;
            font-weight: bold;
        }
        .status-andamento { background: #ffff99; color: #333; border-color: #808080; }
        .status-finalizado { background: #99cc66; color: #000; border-color: #808080; }
        .status-aberto { background: #99ccff; color: #000; border-color: #808080; }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.6);
            z-index: 10000;
            justify-content: center;
            align-items: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: #c0c0c0;
            border: 3px solid;
            border-top-color: #ffffff;
            border-left-color: #ffffff;
            border-right-color: #808080;
            border-bottom-color: #808080;
            max-width: 600px;
            width: 90%;
            max-height: 70vh;
            overflow-y: auto;
            padding: 0;
        }

        .modal-header {
            background: #000080;
            padding: 8px 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .modal-header h3 {
            color: white;
            font-size: 11px;
        }

        .close-modal {
            background: #c0c0c0;
            border: 2px solid;
            border-top-color: #ffffff;
            border-left-color: #ffffff;
            border-right-color: #808080;
            border-bottom-color: #808080;
            width: 22px;
            height: 22px;
            cursor: pointer;
            font-weight: bold;
        }

        .modal-body {
            padding: 16px;
        }

        /* Toast */
        .toast-notify {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #c0c0c0;
            border: 2px solid;
            border-top-color: #ffffff;
            border-left-color: #ffffff;
            border-right-color: #808080;
            border-bottom-color: #808080;
            padding: 8px 16px;
            font-size: 10px;
            font-weight: bold;
            z-index: 10001;
        }

        /* Barra de tarefas */
        .win95-taskbar {
            background: #c0c0c0;
            border-top: 2px solid #ffffff;
            padding: 4px 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 16px;
        }

        .win95-start-btn {
            background: #c0c0c0;
            border: 2px solid;
            border-top-color: #ffffff;
            border-left-color: #ffffff;
            border-right-color: #808080;
            border-bottom-color: #808080;
            padding: 4px 12px;
            display: flex;
            align-items: center;
            gap: 6px;
            font-weight: bold;
            font-size: 10px;
            cursor: pointer;
        }

        /* Scrollbar Windows 95 */
        ::-webkit-scrollbar {
            width: 16px;
            background: #c0c0c0;
        }
        ::-webkit-scrollbar-track {
            background: #c0c0c0;
            border-left: 1px solid #808080;
        }
        ::-webkit-scrollbar-thumb {
            background: #c0c0c0;
            border: 1px solid #808080;
        }

        /* Tabelas */
        .tabela-equipamentos, .tabela-pecas {
            width: 100%;
            border-collapse: collapse;
            background: #ffffff;
            border: 2px inset #808080;
            font-size: 10px;
        }
        .tabela-equipamentos th, .tabela-pecas th {
            background: #000080;
            color: white;
            padding: 6px;
            font-size: 9px;
        }
        .tabela-equipamentos td, .tabela-pecas td {
            border: 1px solid #c0c0c0;
            padding: 6px;
        }

        .search-box {
            margin-bottom: 12px;
            display: flex;
            gap: 8px;
        }
        .search-box input {
            flex: 1;
        }

        @media (max-width: 768px) {
            body { padding: 8px; }
            .win95-body { padding: 12px; }
            .tab-btn { padding: 4px 10px; font-size: 9px; }
            .form-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
<div class="app-container">
    <!-- Janela Principal -->
    <div class="win95-window">
        <div class="win95-title-bar">
            <div class="win95-title-bar-text">
                <i class="fas fa-tooth"></i> ONS OdontoTécnica - Manutenção Odontológica
            </div>
            <div class="win95-title-buttons">
                <div class="win95-title-btn" onclick="if(confirm('Fechar módulo?')) window.location='index.html'"><i class="fas fa-times"></i></div>
            </div>
        </div>

        <!-- Abas Windows 95 -->
        <div class="win95-tabs">
            <button class="tab-btn active" data-tab="dashboard"><i class="fas fa-chart-line"></i> Dashboard</button>
            <button class="tab-btn" data-tab="clientes"><i class="fas fa-users"></i> Clientes</button>
            <button class="tab-btn" data-tab="equipamentos"><i class="fas fa-microscope"></i> Equipamentos</button>
            <button class="tab-btn" data-tab="novaos"><i class="fas fa-plus-circle"></i> Nova OS</button>
            <button class="tab-btn" data-tab="orcamento"><i class="fas fa-file-invoice"></i> Orçamento</button>
            <button class="tab-btn" data-tab="faturamento"><i class="fas fa-file-invoice-dollar"></i> Faturamento</button>
            <button class="tab-btn" data-tab="historico"><i class="fas fa-history"></i> Histórico</button>
            <button class="tab-btn" data-tab="relatorios"><i class="fas fa-chart-bar"></i> Relatórios</button>
            <button class="tab-btn" data-tab="osclientes"><i class="fas fa-mobile-alt"></i> OS Clientes</button>
        </div>

        <div class="win95-body">
            <!-- DASHBOARD -->
            <div id="dashboard" class="tab-pane active">
                <div class="stats-grid" id="statsDashboard">
                    <div class="stat-card"><h3 id="total-clientes">0</h3><p>Clientes Ativos</p></div>
                    <div class="stat-card"><h3 id="total-os-dash">0</h3><p>Ordens de Serviço</p></div>
                    <div class="stat-card"><h3 id="total-andamento-dash">0</h3><p>OS em Andamento</p></div>
                    <div class="stat-card"><h3 id="total-faturas-dash">0</h3><p>Faturas Emitidas</p></div>
                </div>
                
                <div class="btn-group">
                    <button class="win95-btn win95-btn-primary" onclick="abrirAuditoria()"><i class="fas fa-chart-line"></i> Auditoria Financeira</button>
                    <button class="win95-btn" onclick="exportarAuditoriaTXT()"><i class="fas fa-file-alt"></i> Exportar TXT</button>
                    <button class="win95-btn" onclick="enviarAuditoriaWhatsApp()"><i class="fab fa-whatsapp"></i> Enviar Resumo</button>
                </div>
                
                <div style="margin-top: 20px;">
                    <h3 style="font-size: 11px; margin-bottom: 8px;"><i class="fas fa-clock"></i> Últimas Ordens de Serviço</h3>
                    <div class="lista-container" id="lista-recentes"></div>
                </div>
            </div>

            <!-- CLIENTES -->
            <div id="clientes" class="tab-pane">
                <div class="form-grid">
                    <div class="field-group"><label>Nome Completo *</label><input type="text" id="cliente-nome"></div>
                    <div class="field-group"><label>Telefone *</label><input type="text" id="cliente-telefone" placeholder="(35) 9 2000-4813"></div>
                    <div class="field-group"><label>E-mail</label><input type="email" id="cliente-email"></div>
                    <div class="field-group"><label>Endereço</label><input type="text" id="cliente-endereco"></div>
                </div>
                <div class="btn-group">
                    <button class="win95-btn win95-btn-primary" onclick="salvarCliente()"><i class="fas fa-save"></i> Salvar Cliente</button>
                    <button class="win95-btn" onclick="limparFormCliente()"><i class="fas fa-eraser"></i> Limpar</button>
                </div>
                
                <div style="margin-top: 20px;">
                    <div class="search-box"><input type="text" id="searchCliente" placeholder="Buscar cliente..." onkeyup="filtrarClientes()"></div>
                    <div class="lista-container" id="lista-clientes"></div>
                </div>
            </div>

            <!-- EQUIPAMENTOS -->
            <div id="equipamentos" class="tab-pane">
                <h3 style="font-size: 11px; margin-bottom: 12px;">Equipamentos Odontológicos</h3>
                <div id="lista-equipamentos-pre" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 8px;"></div>
                <div style="margin-top: 20px;">
                    <h3 style="font-size: 11px;">Cadastro Rápido</h3>
                    <div class="field-group"><input type="text" id="equip-manual" placeholder="Digite o nome do equipamento"></div>
                    <button class="win95-btn" onclick="usarEquipamentoManual()"><i class="fas fa-play"></i> Iniciar OS</button>
                </div>
            </div>

            <!-- NOVA OS -->
            <div id="novaos" class="tab-pane">
                <div class="form-grid">
                    <div class="field-group"><label>Cliente</label><select id="os-cliente"><option value="">Selecione</option></select></div>
                    <div class="field-group"><label>Equipamento</label><input type="text" id="os-equipamento"></div>
                    <div class="field-group"><label>Defeito / Problema</label><textarea id="os-defeitos" rows="3"></textarea></div>
                    <div class="field-group"><label>Solução / Serviço</label><textarea id="os-solucoes" rows="3"></textarea></div>
                </div>
                <div class="btn-group">
                    <button class="win95-btn win95-btn-primary" onclick="salvarOS()"><i class="fas fa-save"></i> Salvar OS</button>
                    <button class="win95-btn" onclick="limparOS()"><i class="fas fa-trash-alt"></i> Limpar</button>
                </div>
            </div>

            <!-- ORÇAMENTO -->
            <div id="orcamento" class="tab-pane">
                <div class="form-grid">
                    <div class="field-group"><label>Nome do Cliente</label><input type="text" id="orcClienteNome"></div>
                    <div class="field-group"><label>Telefone</label><input type="text" id="orcClienteTelefone"></div>
                    <div class="field-group"><label>Equipamento</label><input type="text" id="orcEquipamento"></div>
                    <div class="field-group"><label>Defeito</label><textarea id="orcDefeito" rows="2"></textarea></div>
                </div>
                <div class="field-group"><label>Serviço Realizado</label><textarea id="orcServico" rows="2"></textarea></div>
                <div class="field-group"><label>Valor (R$)</label><input type="text" id="orcValor" placeholder="0,00"></div>
                <div class="btn-group">
                    <button class="win95-btn win95-btn-primary" onclick="gerarOrcamento()"><i class="fas fa-file-invoice"></i> Gerar Orçamento</button>
                    <button class="win95-btn" onclick="enviarOrcamentoWhatsApp()"><i class="fab fa-whatsapp"></i> Enviar WhatsApp</button>
                </div>
                <div id="orcamentoPreview" style="margin-top: 16px; display: none; background: white; padding: 12px; border: 2px inset #808080;"></div>
            </div>

            <!-- FATURAMENTO -->
            <div id="faturamento" class="tab-pane">
                <div class="field-group"><label>Selecione a OS</label><select id="faturamento-os-select" onchange="carregarDadosOSFaturamento()"><option value="">Selecione</option></select></div>
                <div id="dados-faturamento" style="display: none; margin-top: 16px;">
                    <div class="field-group"><label>Número do Documento</label><input type="text" id="num-documento"></div>
                    <div class="field-group"><label>Peças</label><input type="text" id="peca-nome" placeholder="Nome da peça"></div>
                    <div class="form-grid"><div class="field-group"><input type="text" id="peca-valor" placeholder="Valor"></div><div class="field-group"><input type="number" id="peca-quantidade" placeholder="Qtd" value="1"></div></div>
                    <button class="win95-btn" onclick="adicionarPeca()">Adicionar Peça</button>
                    <div class="lista-container" id="lista-pecas-body" style="margin-top: 12px;"></div>
                    <div class="btn-group" style="margin-top: 12px;">
                        <button class="win95-btn win95-btn-primary" onclick="salvarFatura()"><i class="fas fa-save"></i> Salvar Fatura</button>
                        <button class="win95-btn" onclick="imprimirDocumento()"><i class="fas fa-print"></i> Imprimir</button>
                        <button class="win95-btn" onclick="enviarPorWhatsApp()"><i class="fab fa-whatsapp"></i> WhatsApp</button>
                    </div>
                    <div id="preview-documento" style="margin-top: 16px; background: white; padding: 12px; border: 2px inset #808080;"></div>
                </div>
            </div>

            <!-- HISTÓRICO -->
            <div id="historico" class="tab-pane">
                <div class="search-box"><input type="text" id="searchHistorico" placeholder="Buscar OS..." onkeyup="filtrarHistorico()"></div>
                <div class="lista-container" id="lista-historico"></div>
            </div>

            <!-- RELATÓRIOS -->
            <div id="relatorios" class="tab-pane">
                <div class="btn-group"><button class="win95-btn win95-btn-primary" onclick="exportarRelatorioCompleto()"><i class="fas fa-download"></i> Exportar Relatório Completo</button></div>
                <div class="lista-container" id="lista-relatorios" style="margin-top: 12px;"></div>
            </div>

            <!-- OS CLIENTES -->
            <div id="osclientes" class="tab-pane">
                <div class="stats-grid">
                    <div class="stat-card"><h3 id="total-os-clientes">0</h3><p>Total OS</p></div>
                    <div class="stat-card"><h3 id="total-os-andamento">0</h3><p>Em Andamento</p></div>
                    <div class="stat-card"><h3 id="total-os-finalizadas">0</h3><p>Finalizadas</p></div>
                </div>
                <div class="btn-group">
                    <button class="win95-btn win95-btn-primary" onclick="carregarOSClientes()"><i class="fas fa-sync-alt"></i> Atualizar</button>
                    <button class="win95-btn" onclick="enviarMsgParaTodos()"><i class="fab fa-whatsapp"></i> Mensagem em Massa</button>
                </div>
                <div class="lista-container" id="lista-os-clientes" style="margin-top: 12px;"></div>
            </div>
        </div>
    </div>

    <!-- Barra de Tarefas -->

    function mostrarNotificacao(msg, tipo = 'sucesso') {
        const toast = document.createElement('div');

        toast.style.borderLeft = tipo === 'sucesso' ? '4px solid #008080' : '4px solid #cc0000';

    function formatMoney(v) { 
        if (v === undefined || v === null) return 'R$ 0,00';
        return new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL' }).format(v); 
    }
    
    function parseMoney(str) { 
        if (!str) return 0; 
        return parseFloat(str.replace(/\./g, '').replace(',', '.').replace(/[^\d.-]/g, '')) || 0; 
    }
    
    function formatarTelefone(v) { 
        v = v.replace(/\D/g, ''); 
        if (v.length <= 10) v = v.replace(/(\d{2})(\d{4})(\d{0,4})/, '($1) $2-$3'); 
        else v = v.replace(/(\d{2})(\d{5})(\d{0,4})/, '($1) $2-$3');

    }

    window.adicionarPeca = function() {
        const nome = document.getElementById('peca-nome').value.trim();
        const valor = parseFloat(document.getElementById('peca-valor').value);

        pecasUtilizadas.push({ nome, valor, quantidade, subtotal: valor * quantidade });
        atualizarListaPecasFatura();
        document.getElementById('peca-nome').value = '';
        document.getElementById('peca-valor').value = '';
        document.getElementById('peca-quantidade').value = '1';
    }

        const container = document.getElementById('lista-pecas-body');

        if (pecasUtilizadas.length === 0) { container.innerHTML = '<div class="item-lista">Nenhuma peça adicionada</div>'; return; }

        });

            equipamento: osSelecionadaFatura.equipamento,

            data: new Date().toISOString(),
            valorTotal: calcularTotalFatura(),
            pecas: [...pecasUtilizadas],
            status: 'EM ABERTO'

    // ==================== OS CLIENTES (SUPABASE) ====================
    window.carregarOSClientes = async function() {
        mostrarNotificacao('Carregando OS do app cliente...', 'info');
        try {
            const { data, error } = await supabaseClient.from('chamados').select('*').order('created_at', { ascending: false });
            if (error) throw error;
            osClientes = data || [];
            document.getElementById('total-os-clientes').textContent = osClientes.length;
            document.getElementById('total-os-andamento').textContent = osClientes.filter(os => os.status !== 'Finalizado').length;
            document.getElementById('total-os-finalizadas').textContent = osClientes.filter(os => os.status === 'Finalizado').length;
            const container = document.getElementById('lista-os-clientes');
            if (osClientes.length === 0) { container.innerHTML = '<div class="item-lista">Nenhuma OS encontrada</div>'; return; }
            container.innerHTML = '';
            osClientes.forEach(os => {
                container.innerHTML += `<div class="item-lista"><div><h4>${os.clinica}</h4><p>${os.equipamento} | ${os.prioridade || 'Normal'}</p><p>${new Date(os.created_at).toLocaleString()}</p></div><div><button class="btn-acao" onclick="verOSCliente(${os.id})">Ver</button><button class="btn-acao" onclick="enviarWhatsAppOSCliente(${os.id})"><i class="fab fa-whatsapp"></i></button></div></div>`;
            });
            mostrarNotificacao(`${osClientes.length} OS carregadas`, 'sucesso');
        } catch(err) { mostrarNotificacao('Erro ao carregar OS: ' + err.message, 'erro'); }
    }
    
    window.verOSCliente = function(id) {
        const os = osClientes.find(o => o.id === id);
        document.getElementById('modal-body').innerHTML = `<p><strong>Clínica:</strong> ${os?.clinica}</p><p><strong>Telefone:</strong> ${os?.telefone_cliente}</p><p><strong>Equipamento:</strong> ${os?.equipamento}</p><p><strong>Prioridade:</strong> ${os?.prioridade}</p><p><strong>Detalhe:</strong> ${os?.detalhe || 'N/A'}</p><p><strong>Status:</strong> ${os?.status || 'Em andamento'}</p>`;
        document.getElementById('modalOS').classList.add('active');
    }
    
    window.enviarWhatsAppOSCliente = function(id) {
        const os = osClientes.find(o => o.id === id);
        const telefone = os?.telefone_cliente?.replace(/\D/g, '');
        if (telefone) window.open(`https://wa.me/55${telefone}?text=OS%20${os.id}%20-%20${os.equipamento}`, '_blank');
        else mostrarNotificacao('Telefone não encontrado', 'erro');
    }
    
    window.enviarMsgParaTodos = function() {
        const msg = prompt('Mensagem para todos os clientes:', 'ONS OdontoTécnica - Estamos à disposição para manutenção odontológica!');
        if (msg) osClientes.forEach(os => { if (os.telefone_cliente) window.open(`https://wa.me/55${os.telefone_cliente.replace(/\D/g, '')}?text=${encodeURIComponent(msg)}`, '_blank'); });
    }

    // ==================== AUDITORIA ====================
    function gerarResumoAuditoria() {
        let totalFaturado = faturas.reduce((sum, f) => sum + f.valorTotal, 0);
        let totalEmAberto = faturas.filter(f => f.status === 'EM ABERTO').reduce((sum, f) => sum + f.valorTotal, 0);
        let html = `<h4>Resumo Financeiro</h4><table style="width:100%"><tr><td>Total OS:</td><td>${manutencoes.length}</td></tr><tr><td>Total Faturas:</td><td>${faturas.length}</td></tr><tr><td>Total Faturado:</td><td><strong>${formatMoney(totalFaturado)}</strong></td></tr><tr><td>Em Aberto:</td><td>${formatMoney(totalEmAberto)}</td></tr></table>`;
        return html;
    }
    
    window.abrirAuditoria = function() {
        document.getElementById('conteudo-auditoria').innerHTML = gerarResumoAuditoria();
        document.getElementById('modalAuditoria').classList.add('active');
    }
    
    window.exportarAuditoriaTXT = function() {
        const txt = `ONS ODONTOTÉCNICA - AUDITORIA\nData: ${new Date().toLocaleString()}\n\nTotal OS: ${manutencoes.length}\nTotal Faturas: ${faturas.length}\nTotal Faturado: ${formatMoney(faturas.reduce((s,f)=>s+f.valorTotal,0))}`;
        const blob = new Blob([txt], { type: 'text/plain' });
        const link = document.createElement('a');
        link.href = URL.createObjectURL(blob);
        link.download = `auditoria_ons_${new Date().toISOString().slice(0,10)}.txt`;
        link.click();
        mostrarNotificacao('Arquivo TXT gerado!', 'sucesso');
    }
    
    window.enviarAuditoriaWhatsApp = function() {
        const txt = `ONS ODONTOTÉCNICA\nTotal OS: ${manutencoes.length}\nTotal Faturado: ${formatMoney(faturas.reduce((s,f)=>s+f.valorTotal,0))}`;
        const numero = prompt('Digite o número do WhatsApp:', '');
        if (numero) window.open(`https://wa.me/55${numero.replace(/\D/g, '')}?text=${encodeURIComponent(txt)}`, '_blank');
    }
    
    window.exportarRelatorioCompleto = function() {
        let txt = `RELATÓRIO ONS ODONTOTÉCNICA\n${new Date().toLocaleString()}\n${'='.repeat(50)}\n\nTotal OS: ${manutencoes.length}\n\nDETALHAMENTO:\n`;
        manutencoes.forEach(os => {
            const c = clientes.find(c => c.id === os.clienteId);
            txt += `\nOS #${os.id} | ${c?.nome} | ${os.equipamento} | ${new Date(os.data).toLocaleDateString()}\n`;
        });
        const blob = new Blob([txt], { type: 'text/plain' });
        const link = document.createElement('a');
        link.href = URL.createObjectURL(blob);
        link.download = `relatorio_ons_${new Date().toISOString().slice(0,10)}.txt`;
        link.click();
        mostrarNotificacao('Relatório exportado!', 'sucesso');
    }

    // ==================== DASHBOARD ====================
    function atualizarDashboard() {
        document.getElementById('total-clientes').textContent = clientes.length;
        document.getElementById('total-os-dash').textContent = manutencoes.length;
        document.getElementById('total-andamento-dash').textContent = manutencoes.length;
        document.getElementById('total-faturas-dash').textContent = faturas.length;
        
        const container = document.getElementById('lista-recentes');
        const recentes = [...manutencoes].reverse().slice(0,5);
        if (recentes.length === 0) { container.innerHTML = '<div class="item-lista">Nenhuma OS recente</div>'; return; }
        container.innerHTML = '';
        recentes.forEach(os => {
            const cliente = clientes.find(c => c.id === os.clienteId);
            container.innerHTML += `<div class="item-lista"><div><h4>${cliente?.nome || 'N/A'} - ${os.equipamento}</h4><p>${new Date(os.data).toLocaleDateString()}</p></div><div><button class="btn-acao" onclick="verOSDetalhes(${os.id})">Ver</button></div></div>`;
        });
    }

    // ==================== RELÓGIO E STATUS ====================
    function atualizarRelogio() {
        const relogio = document.getElementById('relogio');
        if (relogio) relogio.innerHTML = new Date().toLocaleTimeString('pt-BR');
    }
    setInterval(atualizarRelogio, 1000);
    atualizarRelogio();
    
    function updateOfflineStatus() {
        const statusSpan = document.getElementById('statusConexao');
        if (!navigator.onLine && statusSpan) statusSpan.innerHTML = 'Offline 💾';
        else if (statusSpan) statusSpan.innerHTML = 'Online ☁️';
    }
    window.addEventListener('online', updateOfflineStatus);
    window.addEventListener('offline', updateOfflineStatus);
    updateOfflineStatus();

    // ==================== EVENTOS ====================
    document.getElementById('cliente-telefone')?.addEventListener('input', e => e.target.value = formatarTelefone(e.target.value));
    document.getElementById('orcValor')?.addEventListener('input', e => {
        let v = e.target.value.replace(/\D/g, '');
        v = (parseInt(v) / 100).toFixed(2);
        e.target.value = v.replace('.', ',');
    });
    
    document.getElementById('modalOS').addEventListener('click', e => { if (e.target === document.getElementById('modalOS')) fecharModal(); });
    document.getElementById('modalAuditoria').addEventListener('click', e => { if (e.target === document.getElementById('modalAuditoria')) fecharModalAuditoria(); });

    // ==================== INIT ====================
    carregarDadosLocais();
    carregarClientesSelect();
    carregarListaClientes();
    mostrarEquipamentos();
    carregarHistorico();
    carregarOSClientes();
    atualizarDashboard();
    carregarSelectOSFaturamento();
    
    console.log('💾 ONS OdontoTécnica - Modo Windows 95 Classic ativado!');
    console.log('   ✅ Todas as funcionalidades operacionais');
    console.log('   💾 Dados salvos localmente');
    console.log('   ☁️ Integração com Supabase ativa');
</script>
</body>
</html>
